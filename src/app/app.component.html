<div class="app-shell">
  <mat-toolbar color="primary" class="app-toolbar">
    <button
      type="button"
      mat-icon-button
      class="menu-mob"
      aria-label="Abrir menu de navegação"
      [matMenuTriggerFor]="menuNav"
    >
      <mat-icon>menu</mat-icon>
    </button>

    <span class="app-marca">
      <mat-icon class="app-marca-icone" aria-hidden="true">hub</mat-icon>
      <span class="app-marca-texto">Desafio Projedata Informatica</span>
    </span>

    <span class="toolbar-spacer"></span>

    <nav class="nav-desktop" aria-label="Navegação principal">
      <a
        mat-button
        routerLink="/"
        routerLinkActive="app-nav-ativo"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-link"
      >
        <mat-icon>groups</mat-icon>
        Usuários
      </a>
      <a mat-button routerLink="/todos" routerLinkActive="app-nav-ativo" class="nav-link">
        <mat-icon>checklist</mat-icon>
        To-dos
      </a>
      <a mat-button routerLink="/cart" routerLinkActive="app-nav-ativo" class="nav-link">
        <mat-icon>shopping_cart</mat-icon>
        Carrinho
      </a>
    </nav>

    <mat-menu #menuNav="matMenu" panelClass="menu-nav-mob">
      <a
        mat-menu-item
        routerLink="/"
        routerLinkActive="app-menu-ativo"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <mat-icon>groups</mat-icon>
        Usuários
      </a>
      <a mat-menu-item routerLink="/todos" routerLinkActive="app-menu-ativo">
        <mat-icon>checklist</mat-icon>
        To-dos
      </a>
      <a mat-menu-item routerLink="/cart" routerLinkActive="app-menu-ativo">
        <mat-icon>shopping_cart</mat-icon>
        Carrinho
      </a>
    </mat-menu>
  </mat-toolbar>

  <main class="app-main">
    <router-outlet />
  </main>
</div>
